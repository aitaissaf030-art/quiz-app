<style>

body{

color: white;
}

h2{

margin-bottom:20px;
}

select,input{

padding:12px;

color:black;
}

padding:12px;
margin-top:8px;
border:none;
border-radius:12px;
background:linear-gradient(to right,#ff512f,#dd2476);

font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{

.result{
